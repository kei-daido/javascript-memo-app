<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>簡易メモアプリ</title>

    <style>
      body {
        font-family: sans-serif;
        background-color: #f5f5f5;
        margin: 0;
        padding: 20px;
      }

      .app {
        max-width: 700px;
        margin: 0 auto;
        background-color: #ffffff;
        padding: 24px;
        border-radius: 8px;
      }

      h1 {
        margin-top: 0;
        text-align: center;
      }

      .input-area,
      .search-area,
      .memo-area {
        margin-top: 24px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-weight: bold;
      }

      input,
      textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 10px;
        font-size: 16px;
        margin-bottom: 16px;
      }

      textarea {
        height: 120px;
        resize: vertical;
      }

      button {
        padding: 8px 16px;
        font-size: 16px;
        cursor: pointer;
      }

      #saveMemoButton {
        width: 100%;
      }

      .memo-item {
        border: 1px solid #dddddd;
        padding: 16px;
        margin-bottom: 16px;
        border-radius: 6px;
        background-color: #fafafa;
      }

      .memo-title {
        margin-top: 0;
        margin-bottom: 8px;
      }

      .memo-body {
        margin-bottom: 12px;
        line-height: 1.6;
      }

      .memo-buttons {
        display: flex;
        gap: 8px;
      }

      .empty-message {
        color: #777777;
        text-align: center;
        padding: 20px;
        border: 1px dashed #cccccc;
        border-radius: 6px;
      }
    </style>
  </head>

  <body>
    <div class="app">
      <h1>簡易メモアプリ</h1>

      <section class="input-area">
        <label for="memoTitleInput">タイトル</label>
        <input
          type="text"
          id="memoTitleInput"
          placeholder="メモのタイトルを入力"
        />

        <label for="memoBodyInput">本文</label>
        <textarea id="memoBodyInput" placeholder="メモの本文を入力"></textarea>

        <button id="addMemoButton">追加</button>
      </section>

      <section class="search-area">
        <label for="searchInput">検索</label>
        <input
          type="text"
          id="searchInput"
          placeholder="タイトル・本文を検索"
        />
      </section>

      <section class="memo-area">
        <h2>メモ一覧</h2>

        <p class="empty-message">メモはまだありません</p>

        <div id="memoList">
          <article class="memo-item">
            <h3 class="memo-title">サンプルメモ1</h3>
            <p class="memo-body">これはJavaScript実装前のサンプルメモです。</p>
            <div class="memo-buttons">
              <button class="edit-button">編集</button>
              <button class="delete-button">削除</button>
            </div>
          </article>

          <article class="memo-item">
            <h3 class="memo-title">サンプルメモ2</h3>
            <p class="memo-body">
              後でJavaScriptを使って、このメモ一覧を自動生成します。
            </p>
            <div class="memo-buttons">
              <button class="edit-button">編集</button>
              <button class="delete-button">削除</button>
            </div>
          </article>
        </div>
      </section>
    </div>
    <script src="script.js"></script>
  </body>
</html>
